<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4477FF"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="#0a0f18"/>
  <!-- Gear body -->
  <circle cx="32" cy="32" r="20" fill="url(#g)"/>
  <!-- Gear teeth (8 positions) -->
  <rect x="28.5" y="4" width="7" height="11" rx="2.5" fill="url(#g)"/>
  <rect x="28.5" y="49" width="7" height="11" rx="2.5" fill="url(#g)"/>
  <rect x="4" y="28.5" width="11" height="7" rx="2.5" fill="url(#g)"/>
  <rect x="49" y="28.5" width="11" height="7" rx="2.5" fill="url(#g)"/>
  <rect x="7.5" y="7.5" width="7" height="11" rx="2.5" fill="url(#g)" transform="rotate(45 11 13)"/>
  <rect x="49.5" y="7.5" width="7" height="11" rx="2.5" fill="url(#g)" transform="rotate(-45 53 13)"/>
  <rect x="7.5" y="45.5" width="7" height="11" rx="2.5" fill="url(#g)" transform="rotate(-45 11 51)"/>
  <rect x="49.5" y="45.5" width="7" height="11" rx="2.5" fill="url(#g)" transform="rotate(45 53 51)"/>
  <!-- Inner hub -->
  <circle cx="32" cy="32" r="13" fill="#0a0f18"/>
  <!-- S letter -->
  <text x="32" y="38.5" text-anchor="middle" font-family="Outfit,system-ui,sans-serif" font-weight="900" font-size="20" fill="white">S</text>
</svg>
